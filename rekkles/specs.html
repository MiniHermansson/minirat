<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rekkles — Gear & Specs</title>
<link rel="icon" href="/los-ratones-logo.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<!-- Firebase -->
<script type="module">
  import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import{getDatabase,ref,onValue}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const cfg={apiKey:"AIzaSyCHx89HHT-nHlP7kcNCTT21-2S7jvI9G-c",authDomain:"miniratxyz.firebaseapp.com",
    databaseURL:"https://miniratxyz-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:"miniratxyz",storageBucket:"miniratxyz.firebasestorage.app",
    messagingSenderId:"524360710142",appId:"1:524360710142:web:a99846767a02914a35b2af"};
  const app=initializeApp(cfg);
  const db=getDatabase(app);

  function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

  // Peripherals
  onValue(ref(db,'rekkles/gear/peripherals'),snap=>{
    const wrap=document.getElementById('periph-grid');
    const items=[];
    if(snap.exists()) snap.forEach(c=>{items.push({id:c.key,...c.val()});});
    items.sort((a,b)=>(a.order??99999)-(b.order??99999));
    if(!items.length){wrap.innerHTML='<div class="empty">no peripherals listed yet.</div>';return;}
    wrap.innerHTML=items.map(item=>`
      <div class="gear-card">
        ${item.imageUrl?`<div class="gear-img"><img src="${escHtml(item.imageUrl)}" alt="${escHtml(item.name)}" loading="lazy"></div>`
          :`<div class="gear-img gear-img-placeholder"><i class="fa-solid fa-display"></i></div>`}
        <div class="gear-body">
          <div class="gear-category">${escHtml(item.category)}</div>
          <div class="gear-name">${escHtml(item.name)}</div>
          ${item.link?`<a href="${escHtml(item.link)}" target="_blank" rel="noopener" class="gear-link"><i class="fa-solid fa-arrow-up-right-from-square"></i> View</a>`:''}
        </div>
      </div>`).join('');
  });

  // Specs
  onValue(ref(db,'rekkles/gear/specs'),snap=>{
    const wrap=document.getElementById('specs-grid');
    const items=[];
    if(snap.exists()) snap.forEach(c=>{items.push({id:c.key,...c.val()});});
    items.sort((a,b)=>(a.order??99999)-(b.order??99999));
    if(!items.length){wrap.innerHTML='<div class="empty">no specs listed yet.</div>';return;}
    wrap.innerHTML=items.map(item=>`
      <div class="spec-row">
        <div class="spec-category">${escHtml(item.category)}</div>
        <div class="spec-name">${escHtml(item.name)}</div>
        ${item.link?`<a href="${escHtml(item.link)}" target="_blank" rel="noopener" class="spec-link"><i class="fa-solid fa-arrow-up-right-from-square"></i></a>`:''}
      </div>`).join('');
  });
</script>
<style>
:root{
  --accent:#E02E41;--accent-dim:rgba(224,46,65,0.55);--accent-bg:rgba(224,46,65,0.12);
  --bg:#0A0A0A;--surface:#141414;--surface2:#1C1C1C;
  --border:rgba(224,46,65,0.25);--text:#EDEDED;--dim:rgba(237,237,237,0.50);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 30% at 50% 0%,rgba(224,46,65,0.08) 0%,transparent 60%),
    radial-gradient(ellipse 30% 80% at 0% 50%,rgba(224,46,65,0.04) 0%,transparent 55%),
    radial-gradient(ellipse 30% 80% at 100% 50%,rgba(224,46,65,0.04) 0%,transparent 55%);}

/* NAV */
nav{display:flex;align-items:stretch;justify-content:space-between;padding:0 24px;
  border-bottom:1px solid var(--border);background:rgba(10,10,10,0.97);backdrop-filter:blur(10px);
  position:sticky;top:0;z-index:200;min-height:38px;}
.nav-brand{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:4px;color:var(--accent);text-decoration:none;
  display:flex;align-items:center;}
.nav-links{display:flex;align-items:stretch;gap:0;}
.nav-links a{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;
  color:var(--dim);text-decoration:none;text-transform:uppercase;padding:0 14px;
  display:flex;align-items:center;transition:all .2s;border-bottom:none;}
.nav-links a:hover{color:var(--text);background:rgba(255,255,255,0.05);border-bottom:2px solid var(--dim);}
.nav-links a.active{color:#fff;background:var(--accent);border-bottom:2px solid rgba(255,255,255,0.5);}

/* PAGE */
.page-wrap{max-width:960px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:6px;color:var(--text);}
.page-sub{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;color:var(--dim);margin-bottom:40px;}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4px;color:var(--accent);
  margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);}

/* GEAR CARDS */
.gear-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:48px;}
.gear-card{background:var(--surface);border:1px solid var(--border);overflow:hidden;transition:border-color .2s;}
.gear-card:hover{border-color:var(--accent);}
.gear-img{width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--surface2);display:flex;align-items:center;justify-content:center;}
.gear-img img{width:100%;height:100%;object-fit:cover;}
.gear-img-placeholder{color:var(--dim);font-size:28px;}
.gear-body{padding:12px 14px;}
.gear-category{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--accent-dim);text-transform:uppercase;}
.gear-name{font-size:15px;font-weight:600;color:var(--text);margin-top:2px;}
.gear-link{display:inline-flex;align-items:center;gap:5px;font-family:'Rajdhani',sans-serif;font-size:11px;
  font-weight:600;letter-spacing:1px;color:var(--accent);text-decoration:none;margin-top:6px;
  text-transform:uppercase;transition:opacity .2s;}
.gear-link:hover{opacity:.7;}

/* SPECS TABLE */
.specs-list{display:flex;flex-direction:column;gap:2px;margin-bottom:48px;}
.spec-row{display:flex;align-items:center;gap:16px;padding:10px 14px;background:var(--surface);
  border:1px solid rgba(224,46,65,0.12);transition:border-color .2s;}
.spec-row:hover{border-color:var(--border);}
.spec-category{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;
  color:var(--accent);width:110px;flex-shrink:0;text-transform:uppercase;}
.spec-name{font-size:14px;font-weight:600;color:var(--text);flex:1;}
.spec-link{color:var(--dim);font-size:12px;transition:color .2s;text-decoration:none;flex-shrink:0;}
.spec-link:hover{color:var(--accent);}

/* EMPTY */
.empty{text-align:center;padding:30px;font-family:'Share Tech Mono',monospace;
  font-size:11px;letter-spacing:2px;color:var(--dim);}

@media(max-width:540px){
  .gear-grid{grid-template-columns:1fr 1fr;gap:10px;}
  .spec-category{width:80px;font-size:9px;}
  .page-title{font-size:28px;}
}
@media(max-width:380px){
  .gear-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">Rekkles</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="calendar.html">Calendar</a>
    <a href="specs.html" class="active">Specs</a>
  </div>
</nav>

<div class="page-wrap">
  <div class="page-title">Gear & Specs</div>
  <div class="page-sub">what rekkles uses</div>

  <div class="section-title">Peripherals</div>
  <div class="gear-grid" id="periph-grid">
    <div class="empty">loading...</div>
  </div>

  <div class="section-title">Computer Specs</div>
  <div class="specs-list" id="specs-grid">
    <div class="empty">loading...</div>
  </div>
</div>

</body>
</html>
