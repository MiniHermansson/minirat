<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Los Ratones — Forever</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script type="module">
  import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import{getDatabase,ref,onValue}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  const cfg={apiKey:"AIzaSyCHx89HHT-nHlP7kcNCTT21-2S7jvI9G-c",authDomain:"miniratxyz.firebaseapp.com",
    databaseURL:"https://miniratxyz-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:"miniratxyz",storageBucket:"miniratxyz.firebasestorage.app",
    messagingSenderId:"524360710142",appId:"1:524360710142:web:a99846767a02914a35b2af"};
  const app=initializeApp(cfg);
  const db=getDatabase(app);
  onValue(ref(db,'tribute/posts'),snap=>{
    const posts=[];
    snap.forEach(c=>{posts.push({id:c.key,...c.val()});});
    posts.sort((a,b)=>(a.order??99999)-(b.order??99999));
    renderPosts(posts);
  });
</script>
<style>
:root{
  --gold:#D4A843;--gold-dim:rgba(212,168,67,0.55);--gold-bg:rgba(212,168,67,0.12);
  --bg:#07070D;--surface:#131320;--surface2:#1A1A2A;
  --border:rgba(212,168,67,0.25);--text:#D0D0E0;--dim:rgba(208,208,224,0.55);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 35% at 50% 0%,rgba(212,168,67,0.10) 0%,transparent 60%),
    radial-gradient(ellipse 35% 80% at 0% 60%,rgba(212,168,67,0.05) 0%,transparent 55%),
    radial-gradient(ellipse 35% 80% at 100% 60%,rgba(212,168,67,0.05) 0%,transparent 55%);}

/* HEADER */
.site-header{text-align:center;padding:72px 24px 48px;position:relative;z-index:1;}
.site-logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,10vw,96px);
  letter-spacing:12px;color:var(--gold);line-height:1;
  text-shadow:0 0 60px rgba(212,168,67,0.25);}
.site-sub{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:5px;
  color:var(--gold-dim);text-transform:uppercase;margin-top:10px;}
.header-divider{width:120px;height:1px;background:var(--border);margin:28px auto 0;}

/* GALLERY */
.gallery-wrap{max-width:700px;margin:0 auto;padding:40px 20px 100px;position:relative;z-index:1;}

/* IMAGE CARD */
.post-image{background:var(--surface);border:1px solid var(--border);overflow:hidden;margin-bottom:18px;}
.post-image img{width:100%;display:block;}
.post-caption{padding:10px 12px;font-size:12px;color:var(--dim);font-family:'Share Tech Mono',monospace;
  letter-spacing:.5px;border-top:1px solid var(--border);}

/* MESSAGE CARD */
.post-message{background:var(--surface);border:1px solid var(--border);padding:22px 24px 20px;margin-bottom:18px;}
.post-quote-mark{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--gold-dim);
  line-height:.8;margin-bottom:10px;display:block;}
.post-text{font-size:16px;line-height:1.65;color:var(--text);font-weight:500;white-space:pre-wrap;}
.post-author{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;
  color:var(--gold-dim);margin-top:16px;display:block;}

/* EMPTY STATE */
.gallery-empty{text-align:center;padding:80px 20px;color:var(--dim);
  font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:2px;}

/* ALT LINK */
.alt-link{text-align:center;padding:0 0 40px;position:relative;z-index:1;}
.alt-link a{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:2px;
  color:var(--dim);text-decoration:none;border-bottom:1px solid rgba(208,208,224,0.2);
  padding-bottom:2px;transition:color .2s,border-color .2s;}
.alt-link a:hover{color:var(--gold);border-color:var(--gold-dim);}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;z-index:2000;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.92);opacity:0;pointer-events:none;transition:opacity .22s;}
.lightbox.open{opacity:1;pointer-events:all;}
.lb-img-wrap{position:relative;max-width:92vw;max-height:88vh;display:flex;align-items:center;justify-content:center;}
.lb-img-wrap img{max-width:92vw;max-height:88vh;object-fit:contain;display:block;
  box-shadow:0 0 60px rgba(0,0,0,0.8);}
.lb-caption{position:absolute;bottom:-28px;left:0;right:0;text-align:center;
  font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;color:var(--dim);}
.lb-arrow{position:fixed;top:50%;transform:translateY(-50%);background:none;border:1px solid var(--border);
  color:var(--gold);font-size:22px;width:44px;height:60px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .18s;
  font-family:'Bebas Neue',sans-serif;}
.lb-arrow:hover{background:var(--gold-bg);border-color:var(--gold);}
.lb-arrow.prev{left:16px;}
.lb-arrow.next{right:16px;}
.lb-arrow.hidden{opacity:0;pointer-events:none;}
.lb-close{position:fixed;top:16px;right:16px;background:none;border:1px solid var(--border);
  color:var(--dim);font-size:18px;width:36px;height:36px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .18s;}
.lb-close:hover{border-color:var(--gold);color:var(--gold);}
.post-image{cursor:zoom-in;}
</style>
</head>
<body>
<header class="site-header">
  <div class="site-logo">LOS RATONES</div>
  <div class="site-sub">forever in our hearts</div>
  <div class="header-divider"></div>
</header>

<main class="gallery-wrap" id="gallery">
  <div class="gallery-empty" id="empty-state">loading memories...</div>
</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lb-close">✕</button>
  <button class="lb-arrow prev" id="lb-prev">‹</button>
  <div class="lb-img-wrap">
    <img id="lb-img" src="" alt="">
    <div class="lb-caption" id="lb-caption"></div>
  </div>
  <button class="lb-arrow next" id="lb-next">›</button>
</div>

<div class="alt-link">
  <a href="index.html">switch to masonry view</a>
</div>

<script>
let imagePosts=[];
let lbIndex=0;

function renderPosts(posts){
  imagePosts=posts.filter(p=>p.type==='image');
  const gallery=document.getElementById('gallery');
  const empty=document.getElementById('empty-state');
  gallery.innerHTML='';
  if(!posts.length){
    gallery.appendChild(empty);
    empty.textContent='no posts yet.';
    return;
  }
  let imgIdx=0;
  posts.forEach(p=>{
    const item=document.createElement('div');
    if(p.type==='image'){
      const idx=imgIdx++;
      item.innerHTML=`<div class="post-image" data-lb="${idx}">
        <img src="${p.url}" alt="${p.caption||''}" loading="lazy">
        ${p.caption?`<div class="post-caption">${escHtml(p.caption)}</div>`:''}
      </div>`;
      item.querySelector('.post-image').addEventListener('click',()=>lbOpen(idx));
    } else {
      item.innerHTML=`<div class="post-message">
        <span class="post-quote-mark">"</span>
        <div class="post-text">${escHtml(p.content||'')}</div>
        ${p.author?`<span class="post-author">— ${escHtml(p.author)}</span>`:''}
      </div>`;
    }
    gallery.appendChild(item);
  });
}

function lbOpen(idx){
  lbIndex=idx;
  lbShow();
  document.getElementById('lightbox').classList.add('open');
}
function lbClose(){document.getElementById('lightbox').classList.remove('open');}
function lbShow(){
  const p=imagePosts[lbIndex];
  document.getElementById('lb-img').src=p.url;
  document.getElementById('lb-caption').textContent=p.caption||'';
  document.getElementById('lb-prev').classList.toggle('hidden',lbIndex===0);
  document.getElementById('lb-next').classList.toggle('hidden',lbIndex===imagePosts.length-1);
}
function lbGo(dir){
  const next=lbIndex+dir;
  if(next<0||next>=imagePosts.length)return;
  lbIndex=next;lbShow();
}

document.getElementById('lb-close').addEventListener('click',lbClose);
document.getElementById('lb-prev').addEventListener('click',()=>lbGo(-1));
document.getElementById('lb-next').addEventListener('click',()=>lbGo(1));
document.getElementById('lightbox').addEventListener('click',e=>{if(e.target===e.currentTarget)lbClose();});
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('open'))return;
  if(e.key==='ArrowLeft')lbGo(-1);
  else if(e.key==='ArrowRight')lbGo(1);
  else if(e.key==='Escape')lbClose();
});

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
