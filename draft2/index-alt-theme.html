<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fearless Draft — Alt Theme</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&family=Bungee+Inline&display=swap" rel="stylesheet">
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('fearless-theme')||'dark');</script>
<style>
:root {
  --gold:#1ABA91; --gold-dim:rgba(26,186,145,0.55); --gold-bg:rgba(26,186,145,0.12);
  --blue:#4D9EF5; --blue-bg:rgba(77,158,245,0.12); --blue-border:rgba(77,158,245,0.5);
  --red:#EF4444;  --red-bg:rgba(239,68,68,0.12);   --red-border:rgba(239,68,68,0.5);
  --bg:#050F0C; --surface:#081410; --surface2:#0C1A16;
  --border:rgba(26,186,145,0.25); --text:#d8c9ff; --dim:rgba(216,201,255,0.55);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 30% at 50% 0%,rgba(26,186,145,0.10) 0%,transparent 60%);}
nav{display:flex;align-items:center;justify-content:space-between;padding:9px 24px;
  border-bottom:1px solid var(--border);background:rgba(5,15,12,0.95);backdrop-filter:blur(10px);
  position:sticky;top:0;z-index:200;}
.nav-logo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:4px;color:var(--gold);}
.nav-logo span{color:rgba(208,208,224,0.7);font-size:11px;letter-spacing:2px;}
.nav-btn{background:none;border:1px solid var(--border);color:var(--text);font-family:'Rajdhani',sans-serif;
  font-size:12px;letter-spacing:1.5px;padding:5px 16px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block;}
.nav-btn:hover{border-color:var(--gold);color:var(--gold);}
.series-header{display:flex;align-items:center;justify-content:center;gap:18px;padding:14px 24px 20px;}
.team-hero{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,3vw,38px);letter-spacing:3px;min-width:130px;color:#d8c9ff;}
.team-hero.t1{text-align:right;}
.team-hero.t2{text-align:left;}
.score-block{text-align:center;flex-shrink:0;position:relative;}
.team-hero{align-self:center;}
.score-nums{font-family:'Bebas Neue',sans-serif;font-size:clamp(26px,4vw,46px);letter-spacing:6px;color:#d8c9ff;line-height:1;}
.score-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--gold);opacity:0.75;position:absolute;top:100%;left:50%;transform:translateX(-50%);white-space:nowrap;margin-top:2px;}
.games-stack{display:flex;flex-direction:column;gap:10px;padding:0 14px 10px;max-width:1100px;margin:0 auto;}
.game-block{display:flex;flex-direction:column;}
.game-body{overflow:hidden;transition:max-height .28s ease;display:flex;flex-direction:column;}
.game-body.collapsed{max-height:0!important;}
.game-lbl{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:4px 18px;
  background:var(--surface2);border:1px solid var(--border);border-bottom:none;align-self:center;
  font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:3px;color:var(--gold);
  cursor:pointer;user-select:none;transition:background .15s;}
.game-lbl:hover{background:var(--gold-bg);}
.game-lbl .collapse-arrow{font-size:9px;color:var(--gold-dim);transition:transform .25s;}
.game-lbl.collapsed .collapse-arrow{transform:rotate(-90deg);}
.game-header{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--border);border-bottom:none;}
.game-header-team{display:flex;align-items:center;justify-content:center;padding:4px 14px;
  font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:3px;}
.game-header-team.blue{color:var(--blue);background:var(--blue-bg);border-right:1px solid var(--border);}
.game-header-team.red{color:var(--red);background:var(--red-bg);}
.game-footer{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:5px 14px;
  border:1px solid var(--border);border-top:none;align-self:center;
  font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:3px;}
.game-footer.tbd{background:var(--surface2);color:rgba(208,208,224,0.65);}
.game-footer.won{background:rgba(26,186,145,0.18);border-color:rgba(26,186,145,0.6);color:var(--gold);}
.game-row{display:grid;grid-template-columns:1fr 1fr;background:var(--surface);border:1px solid var(--border);min-height:80px;position:relative;}
.team-col{display:flex;flex-direction:column;justify-content:flex-start;padding:8px 12px;gap:5px;}
.team-col.t1{background:var(--blue-bg);border-right:1px solid var(--border);}
.team-col.t2{background:var(--red-bg);}
.tc-picks{display:flex;gap:6px;align-items:flex-start;justify-content:center;}
.pick-slot{display:flex;flex-direction:column;align-items:center;gap:2px;width:52px;}
.pick-slot-name{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;color:rgba(210,210,228,0.9);
  text-align:center;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;height:13px;}
.pick-slot-role{font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:1.5px;
  color:rgba(216,201,255,0.65);text-transform:uppercase;text-align:center;height:10px;margin-top:4px;}
.pick-slot-empty .ci-img-wrap{opacity:0.15;}
.tc-bans{display:flex;flex-wrap:wrap;gap:3px;align-items:center;justify-content:center;margin-top:5px;}
.tc-bans-lbl{font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:2px;color:rgba(26,186,145,0.65);margin-right:3px;flex-shrink:0;}
.ci{position:relative;width:44px;height:44px;border:1px solid rgba(255,255,255,0.15);overflow:visible;flex-shrink:0;}
.ci-img-wrap{width:44px;height:44px;overflow:hidden;position:relative;}
.ci img{width:115%;height:115%;object-fit:cover;object-position:top center;margin:-7% 0 0 -7%;display:block;}
.ci .ctip{position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);
  background:#04100D;border:1px solid var(--gold);color:var(--gold);
  font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.5px;
  padding:3px 9px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .12s;z-index:300;}
.ci:hover .ctip{opacity:1;}
.ci.ban .ci-img-wrap img{filter:grayscale(0.6) brightness(0.55) sepia(0.4);}
.ci.ban .ci-img-wrap::after{content:'';position:absolute;inset:0;background:rgba(239,68,68,0.28);}
.ci.sm .ci-img-wrap{width:32px;height:32px;}
.ci.sm{width:32px;height:32px;}
.ci.sm img{width:115%;height:115%;}
.graveyard{max-width:1500px;margin:0 auto;padding:8px 14px 28px;border-top:1px solid var(--border);}
.grave-hdr{display:flex;align-items:center;gap:12px;padding:8px 0;}
.grave-title{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:4px;color:var(--gold);white-space:nowrap;}
.grave-line{flex:1;height:1px;background:linear-gradient(to right,var(--gold-dim),transparent);}
.grave-count{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--gold);}
.grave-body-row{display:flex;flex-direction:row;gap:56px;flex-wrap:wrap;justify-content:center;}
.grave-role-row{display:flex;flex-direction:column;align-items:center;gap:5px;}
.grave-role-icon{width:20px;height:20px;color:rgba(216,201,255,0.85);opacity:0.8;}
.grave-role-icon svg{width:100%;height:100%;}
.grave-chips{display:grid;gap:3px;position:relative;}
.grave-role-row:not(:last-child) .grave-chips::after{content:'';position:absolute;right:-28px;top:0;bottom:0;width:1px;
  background:linear-gradient(to bottom,transparent,rgba(216,201,255,0.35) 25%,rgba(216,201,255,0.35) 75%,transparent);}
.gchip{position:relative;width:32px;height:32px;overflow:visible;cursor:default;flex-shrink:0;}
.gchip img{width:32px;height:32px;object-fit:cover;object-position:top center;display:block;
  filter:grayscale(0.2) brightness(0.9);border:1px solid rgba(216,201,255,0.12);transition:filter .15s,border-color .15s;}
.gchip:hover img{filter:none;border-color:var(--gold-dim);}
.gchip .gtip{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);
  background:#04100D;border:1px solid var(--gold-dim);color:var(--gold);
  font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.5px;
  padding:3px 8px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .12s;z-index:300;}
.gchip:hover .gtip{opacity:1;}
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;background:var(--surface2);
  border:1px solid var(--gold-dim);color:#d8c9ff;font-family:'Rajdhani',sans-serif;
  font-size:12px;letter-spacing:1px;padding:8px 16px;opacity:0;transform:translateY(8px);
  transition:all .2s;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}

/* ── LIGHT MODE ── */
html[data-theme="light"]{
  --bg:#EDF7F4; --surface:#FFFFFF; --surface2:#D8F0EA;
  --border:rgba(10,140,100,0.25); --text:#0E1E1A; --dim:#2A5A4E;
  --gold:#0F9070; --gold-dim:#13A882; --gold-bg:rgba(15,144,112,0.1);
  --blue:#1D6FBF; --blue-bg:rgba(29,111,191,0.1); --blue-border:rgba(29,111,191,0.5);
  --red:#C92E2E; --red-bg:rgba(201,46,46,0.1); --red-border:rgba(201,46,46,0.5);}
html[data-theme="light"] body::before{
  background:
    radial-gradient(ellipse 70% 30% at 50% 0%,rgba(15,144,112,0.07) 0%,transparent 60%);}
html[data-theme="light"] nav{background:rgba(237,247,244,0.97);}
/* Hardcoded light-on-dark colors that need explicit overrides */
html[data-theme="light"] .team-hero,
html[data-theme="light"] .score-nums{color:var(--text);}
html[data-theme="light"] .pick-slot-name{color:#0E1E1A;}
html[data-theme="light"] .pick-slot-role{color:#13A882;}
html[data-theme="light"] .tc-bans-lbl{color:#13A882;}
html[data-theme="light"] .ci .ctip,
html[data-theme="light"] .gchip .gtip{background:#FFFFFF;color:#0F9070;border-color:rgba(10,140,100,0.25);}
html[data-theme="light"] .gchip img{border-color:rgba(0,0,0,0.15);}
html[data-theme="light"] .grave-role-icon{color:rgba(100,80,180,0.75);}
html[data-theme="light"] #toast{color:var(--text);}
html[data-theme="light"] .game-lbl{background:var(--surface2);}
html[data-theme="light"] .game-footer.won{background:rgba(122,94,10,0.15);border-color:rgba(122,94,10,0.5);}
.theme-btn{background:none;border:1px solid var(--border);color:var(--gold);font-size:14px;
  width:30px;height:30px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;padding:0;}
.theme-btn:hover{border-color:var(--gold);background:var(--gold-bg);}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">FEARLESS <span>SERIES</span></div>
  <div style="display:flex;align-items:center;gap:8px;">
    <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark"></button>
    <a class="nav-btn" href="admin.html">ADMIN</a>
  </div>
</nav>
<div class="series-header">
  <div class="team-hero t1" id="d-t1">TEAM 1</div>
  <div class="score-block">
    <div class="score-nums" id="d-score">0 — 0</div>
    <div class="score-lbl">SERIES SCORE</div>
  </div>
  <div class="team-hero t2" id="d-t2">TEAM 2</div>
</div>
<div class="games-stack" id="games-stack"></div>
<div class="graveyard">
  <div class="grave-hdr">
    <div class="grave-title">FEARLESS GRAVEYARD</div>
    <div class="grave-line"></div>
    <div class="grave-count" id="grave-count">0 LOCKED</div>
  </div>
  <div id="grave-body"></div>
</div>
<div id="toast"></div>
<script>
const FB_URL = 'https://miniratxyz-default-rtdb.europe-west1.firebasedatabase.app/draft.json';
let DD = '15.1.1';
const CM = {}, CD_ID = {};
let ALL_CHAMPS = [];
let S = defaultState();

function defaultState() {
  return { team1:'TEAM 1', team2:'TEAM 2', score1:0, score2:0, bestOf:5,
    games: Array.from({length:5},()=>({side1:'',winner:'',picks:[],bans:[]})) };
}
function normaliseState(d) {
  if (!d||typeof d!=='object') return defaultState();
  if (!d.games||!Array.isArray(d.games)) d.games=defaultState().games;
  while (d.games.length<5) d.games.push({side1:'',winner:'',picks:[],bans:[]});
  d.games=d.games.map(g=>({side1:g.side1??'',winner:g.winner??'',picks:Array.isArray(g.picks)?g.picks:[],bans:Array.isArray(g.bans)?g.bans:[]}));
  d.team1=d.team1??'TEAM 1'; d.team2=d.team2??'TEAM 2';
  d.score1=d.score1??0; d.score2=d.score2??0; d.bestOf=d.bestOf??5;
  return d;
}

function cdnImg(id){return`https://raw.communitydragon.org/latest/plugins/rcp-be-lol-game-data/global/default/v1/champion-icons/${id}.png`;}
function cImgDD(name){const k=CM[name];return k?`https://ddragon.leagueoflegends.com/cdn/${DD}/img/champion/${k}.png`:`https://ddragon.leagueoflegends.com/cdn/${DD}/img/champion/${name.replace(/[^a-zA-Z0-9]/g,'')}.png`;}
function cImg(name){const id=CD_ID[name];return id!==undefined?cdnImg(id):cImgDD(name);}
function setImg(el,name){el.src=cImg(name);el.onerror=function(){const dd=cImgDD(name);if(this.src!==dd)this.src=dd;else{this.style.opacity=0.3;this.onerror=null;}};}

async function loadChamps(){
  try{
    const v=await(await fetch('https://ddragon.leagueoflegends.com/api/versions.json')).json();
    DD=v[0];
    const d=await(await fetch(`https://ddragon.leagueoflegends.com/cdn/${DD}/data/en_US/champion.json`)).json();
    Object.keys(d.data).forEach(k=>{CM[d.data[k].name]=k;CD_ID[d.data[k].name]=parseInt(d.data[k].key);});
  }catch(e){}
}

function gameSides(g){const tbd=!g.side1;const blue=g.side1||'t1';return{blueTeam:blue,redTeam:blue==='t1'?'t2':'t1',tbd};}
function teamName(s){return s==='t1'?S.team1:S.team2;}

const ROLE_ORDER=['Top','Jungle','Mid','Bot','Support'];
const ROLE_SHORT={Top:'TOP',Jungle:'JGL',Mid:'MID',Bot:'BOT',Support:'SUP'};
const ROLE_SVG={
  Top:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 34 34"><path opacity="0.3" fill="currentColor" fill-rule="evenodd" d="M21,14H14v7h7V14Zm5-3V26L11.014,26l-4,4H30V7.016Z"/><polygon fill="currentColor" points="4 4 4.003 28.045 9 23 9 9 23 9 28.045 4.003 4 4"/></svg>`,
  Jungle:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 34 34"><path fill="currentColor" fill-rule="evenodd" d="M25,3c-2.128,3.3-5.147,6.851-6.966,11.469A42.373,42.373,0,0,1,20,20a27.7,27.7,0,0,1,1-3C21,12.023,22.856,8.277,25,3ZM13,20c-1.488-4.487-4.76-6.966-9-9,3.868,3.136,4.422,7.52,5,12l3.743,3.312C14.215,27.917,16.527,30.451,17,31c4.555-9.445-3.366-20.8-8-28C11.67,9.573,13.717,13.342,13,20Zm8,5a15.271,15.271,0,0,1,0,2l4-4c0.578-4.48,1.132-8.864,5-12C24.712,13.537,22.134,18.854,21,25Z"/></svg>`,
  Mid:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 34 34"><path opacity="0.3" fill="currentColor" fill-rule="evenodd" d="M30,12.968l-4.008,4L26,26H17l-4,4H30ZM16.979,8L21,4H4V20.977L8,17,8,8h8.981Z"/><polygon fill="currentColor" points="25 4 4 25 4 30 9 30 30 9 30 4 25 4"/></svg>`,
  Bot:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 34 34"><path opacity="0.3" fill="currentColor" fill-rule="evenodd" d="M13,20h7V13H13v7ZM4,4V26.984l3.955-4L8,8,22.986,8l4-4H4Z"/><polygon fill="currentColor" points="29.997 5.955 25 11 25 25 11 25 5.955 29.997 30 30 29.997 5.955"/></svg>`,
  Support:`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 34 34"><path fill="currentColor" fill-rule="evenodd" d="M26,13c3.535,0,8-4,8-4H23l-3,3,2,7,5-2-3-4h2ZM22,5L20.827,3H13.062L12,5l5,6Zm-5,9-1-1L13,28l4,3,4-3L18,13ZM11,9H0s4.465,4,8,4h2L7,17l5,2,2-7Z"/></svg>`
};

function renderDisplay(){
  document.getElementById('d-t1').textContent=S.team1;
  document.getElementById('d-t2').textContent=S.team2;
  let s1=0,s2=0;
  for(let i=0;i<S.bestOf;i++){if(S.games[i].winner==='t1')s1++;else if(S.games[i].winner==='t2')s2++;}
  document.getElementById('d-score').textContent=`${s1} — ${s2}`;
  const stack=document.getElementById('games-stack');
  stack.innerHTML='';
  for(let i=0;i<S.bestOf;i++) stack.appendChild(buildGameBlock(S.games[i],i));
  renderGraveyard();
}

function buildGameBlock(g,gi){
  const {blueTeam,redTeam,tbd}=gameSides(g);
  const blueName=tbd?'BLUE SIDE':teamName(blueTeam);
  const redName=tbd?'RED SIDE':teamName(redTeam);
  const bluePicks=g.picks.filter(p=>p.side===blueTeam);
  const redPicks=g.picks.filter(p=>p.side===redTeam);
  const blueBans=g.bans.filter(b=>b.side===blueTeam);
  const redBans=g.bans.filter(b=>b.side===redTeam);

  const block=document.createElement('div'); block.className='game-block';
  const hasContent=(g.picks&&g.picks.length>0)||(g.bans&&g.bans.length>0);
  let collapsed=gi===0?false:!hasContent; // game 1 always expanded; others expanded only if they have picks/bans

  const lbl=document.createElement('div');
  lbl.className='game-lbl'+(collapsed?' collapsed':'');
  lbl.innerHTML=`<span>GAME ${gi+1}</span><span class="collapse-arrow">▾</span>`;
  block.appendChild(lbl);

  const body=document.createElement('div');
  body.className='game-body'+(collapsed?' collapsed':'');
  body.style.maxHeight=collapsed?'0px':'600px';

  // header
  const hdr=document.createElement('div'); hdr.className='game-header';
  const bh=document.createElement('div'); bh.className='game-header-team blue'; bh.textContent=blueName;
  const rh=document.createElement('div'); rh.className='game-header-team red'; rh.textContent=redName;
  hdr.appendChild(bh); hdr.appendChild(rh);
  body.appendChild(hdr);

  // row
  const row=document.createElement('div'); row.className='game-row';
  const bc=document.createElement('div'); bc.className='team-col t1';
  const bp=document.createElement('div'); bp.className='tc-picks';
  buildRoleSlots(bluePicks,bp); bc.appendChild(bp);
  if(blueBans.length){const br=document.createElement('div');br.className='tc-bans';blueBans.forEach(b=>br.appendChild(makeCI(b.champion,true,'',true)));bc.appendChild(br);}
  const rc=document.createElement('div'); rc.className='team-col t2';
  const rp=document.createElement('div'); rp.className='tc-picks';
  buildRoleSlots(redPicks,rp); rc.appendChild(rp);
  if(redBans.length){const br=document.createElement('div');br.className='tc-bans';redBans.forEach(b=>br.appendChild(makeCI(b.champion,true,'',true)));rc.appendChild(br);}
  row.appendChild(bc); row.appendChild(rc);
  body.appendChild(row);

  // footer
  const footer=document.createElement('div');
  if(g.winner){footer.className='game-footer won';footer.textContent=`▲ ${teamName(g.winner)} WINS`;}
  else{footer.className='game-footer tbd';footer.textContent='NO RESULT';}
  body.appendChild(footer);
  block.appendChild(body);

  lbl.addEventListener('click',()=>{
    collapsed=!collapsed;
    lbl.classList.toggle('collapsed',collapsed);
    if(collapsed){body.style.maxHeight=body.scrollHeight+'px';requestAnimationFrame(()=>{body.style.maxHeight='0px';});body.classList.add('collapsed');}
    else{body.classList.remove('collapsed');body.style.maxHeight='600px';}
  });
  return block;
}

function buildRoleSlots(picks,container){
  const assigned={},unassigned=[];
  picks.forEach(p=>{const r=ROLE_ORDER.includes(p.role)?p.role:null;if(r&&!assigned[r])assigned[r]=p;else unassigned.push(p);});
  let ui=0;
  ROLE_ORDER.forEach(role=>{if(!assigned[role]&&ui<unassigned.length)assigned[role]=unassigned[ui++];});
  ROLE_ORDER.forEach(role=>{
    const p=assigned[role];
    const slot=document.createElement('div'); slot.className='pick-slot'+(p?'':' pick-slot-empty');
    const nm=document.createElement('div'); nm.className='pick-slot-name'; nm.textContent=p?p.champion:''; slot.appendChild(nm);
    if(p){slot.appendChild(makeCI(p.champion,false,p.role));}
    else{const e=document.createElement('div');e.className='ci pick-slot-empty';const iw=document.createElement('div');iw.className='ci-img-wrap';iw.style.cssText='background:rgba(26,186,145,0.06);border:1px dashed rgba(26,186,145,0.25);width:44px;height:44px;';e.appendChild(iw);slot.appendChild(e);}
    const rl=document.createElement('div'); rl.className='pick-slot-role'; rl.textContent=ROLE_SHORT[role]; slot.appendChild(rl);
    container.appendChild(slot);
  });
}

function makeCI(name,isBan,role='',small=false){
  const wrap=document.createElement('div'); wrap.className='ci'+(isBan?' ban':'')+(small?' sm':'');
  const iw=document.createElement('div'); iw.className='ci-img-wrap';
  if(small){iw.style.width='32px';iw.style.height='32px';}
  const img=document.createElement('img'); setImg(img,name); iw.appendChild(img); wrap.appendChild(iw);
  const tip=document.createElement('div'); tip.className='ctip'; tip.textContent=name+(role?' · '+role:''); wrap.appendChild(tip);
  return wrap;
}

function renderGraveyard(){
  const ROLES=['Top','Jungle','Mid','Bot','Support',''];
  const LABELS={Top:'TOP',Jungle:'JUNGLE',Mid:'MID',Bot:'BOT',Support:'SUPPORT','':'NO ROLE'};
  const seen=new Set(),byRole={};
  ROLES.forEach(r=>byRole[r]=[]);
  for(let gi=0;gi<S.bestOf;gi++){
    S.games[gi].picks.forEach(p=>{const k=p.champion.toLowerCase();if(!seen.has(k)){seen.add(k);const r=ROLES.includes(p.role)?p.role:'';byRole[r].push({...p,game:gi+1});}});
  }
  document.getElementById('grave-count').textContent=`${seen.size} LOCKED`;
  const body=document.getElementById('grave-body'); body.innerHTML='';
  if(!seen.size){body.innerHTML=`<span style="font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(216,201,255,0.18);letter-spacing:2px;">NONE YET</span>`;return;}
  const bodyRow=document.createElement('div'); bodyRow.className='grave-body-row';
  ROLES.forEach(role=>{
    const entries=byRole[role]; if(!entries.length)return;
    const row=document.createElement('div'); row.className='grave-role-row';
    if(ROLE_SVG[role]){const ico=document.createElement('div');ico.className='grave-role-icon';ico.innerHTML=ROLE_SVG[role];row.appendChild(ico);}
    const chips=document.createElement('div'); chips.className='grave-chips';
    const maxGame=Math.max(...entries.map(e=>e.game));
    chips.style.gridTemplateColumns=`repeat(${maxGame},32px)`;
    const rowPerGame={};
    entries.forEach(e=>{
      const chip=document.createElement('div'); chip.className='gchip';
      if(!rowPerGame[e.game])rowPerGame[e.game]=1;
      chip.style.gridColumn=e.game;
      chip.style.gridRow=rowPerGame[e.game]++;
      const img=document.createElement('img'); setImg(img,e.champion);
      const tip=document.createElement('div'); tip.className='gtip'; tip.textContent=e.champion+' · G'+e.game;
      chip.appendChild(img); chip.appendChild(tip); chips.appendChild(chip);
    });
    row.appendChild(chips); bodyRow.appendChild(row);
  });
  body.appendChild(bodyRow);
}

function toggleTheme(){
  const cur=document.documentElement.getAttribute('data-theme')||'dark';
  const next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('fearless-theme',next);
  document.getElementById('theme-toggle').textContent=next==='dark'?'☀':'☽';
}
